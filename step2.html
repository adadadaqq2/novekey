<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nove Key System | Step 2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d0d25 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Gotham', sans-serif;
        }
        .container {
            text-align: center;
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 48px;
            border: 1px solid rgba(0, 100, 255, 0.3);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .logo span { font-size: 48px; font-weight: bold; color: white; }
        h1 { color: white; font-size: 28px; margin-bottom: 12px; }
        p { color: #8899bb; margin-bottom: 32px; }
        .btn {
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            color: white;
            border: none;
            padding: 14px 42px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .footer { margin-top: 32px; color: #556688; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo"><span>N</span></div>
    <h1>NOVE KEY SYSTEM</h1>
    <p>Step 2 of 2 — Final verification</p>
    <button class="btn" id="startBtn">FINAL VERIFICATION →</button>
    <div class="footer">© 2024 Nove Key System</div>
</div>

<script>
    const LINKVERTISE_URL = "https://direct-link.net/..."; // 2. LINKİN
    
    document.getElementById('startBtn').addEventListener('click', function() {
        window.open(LINKVERTISE_URL, '_blank');
        alert("Complete the final verification in the new tab, then come back");
        
        const btn = document.getElementById('startBtn');
        btn.style.display = 'none';
        
        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'btn';
        confirmBtn.textContent = '✓ I COMPLETED THE VERIFICATION';
        confirmBtn.style.marginTop = '20px';
        confirmBtn.style.background = 'linear-gradient(135deg, #00cc66, #009944)';
        confirmBtn.onclick = function() {
            window.location.href = "https://adadadaqq2.github.io/novekey/step3.html";
        };
        document.querySelector('.container').appendChild(confirmBtn);
    });
</script>
</body>
</html>
