<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nove Key System | Your Key</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 80% 30%, #0a0a1a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', 'Gotham', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Neon ışık efektleri */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                transparent 0%,
                rgba(0, 100, 255, 0.03) 50%,
                transparent 100%
            );
            animation: scanHorizontal 10s linear infinite;
            pointer-events: none;
        }

        @keyframes scanHorizontal {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #00a3ff;
            border-radius: 50%;
            opacity: 0.5;
            animation: particleFloat 8s linear infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(25px);
            border-radius: 56px;
            padding: 60px 50px;
            border: 1px solid rgba(0, 200, 255, 0.4);
            box-shadow: 0 0 80px rgba(0, 100, 255, 0.25), inset 0 0 40px rgba(0, 100, 255, 0.05);
            animation: scaleIn 0.6s ease-out;
            max-width: 550px;
            width: 90%;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.5);
            animation: neonPulse 2s ease-in-out infinite;
        }

        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 100, 255, 0.4); }
            50% { box-shadow: 0 0 80px rgba(0, 150, 255, 0.7); }
        }

        .logo span {
            font-size: 52px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .success-badge {
            display: inline-block;
            background: rgba(0, 200, 100, 0.15);
            border: 1px solid rgba(0, 200, 100, 0.4);
            border-radius: 50px;
            padding: 6px 18px;
            font-size: 11px;
            font-weight: 600;
            color: #00ffaa;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
        }

        .key-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 28px 20px;
            margin: 30px 0;
            border: 1px solid rgba(0, 100, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.1), inset 0 0 20px rgba(0, 100, 255, 0.05);
            position: relative;
        }

        .key-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #0064ff, #00a3ff, #0064ff);
            border-radius: 26px;
            opacity: 0.3;
            z-index: -1;
        }

        .key-label {
            font-size: 11px;
            letter-spacing: 3px;
            color: #00a3ff;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .key {
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(135deg, #00a3ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-break: break-all;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0, 163, 255, 0.3);
        }

        .btn {
            background: linear-gradient(135deg, #00cc66, #009944);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 200, 100, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 250px;
            height: 250px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(0, 200, 100, 0.5);
        }

        .footer {
            margin-top: 30px;
            font-size: 10px;
            color: #4a6080;
            letter-spacing: 1px;
        }

        .glow-text {
            color: #00a3ff;
            text-shadow: 0 0 8px rgba(0, 163, 255, 0.5);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="logo"><span>N</span></div>
        <div class="success-badge">✓ VERIFICATION COMPLETE</div>
        <h1>YOUR KEY IS READY</h1>
        <div class="key-box">
            <div class="key-label">UNIQUE LICENSE KEY</div>
            <div class="key" id="keyValue">N7KQ-3X2M-9P4R-6V8W</div>
        </div>
        <button class="btn" id="copyBtn">⟡ COPY KEY ⟡</button>
        <div class="footer">© 2024 NOVE • <span class="glow-text">VALID FOR 24 HOURS</span></div>
    </div>

    <script>
        // Partikül efekti
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = 5 + Math.random() * 5 + 's';
            document.getElementById('particles').appendChild(particle);
        }

        document.getElementById('copyBtn').onclick = function() {
            const key = document.getElementById('keyValue').innerText;
            navigator.clipboard.writeText(key);
            this.innerText = "✓ COPIED!";
            setTimeout(() => this.innerText = "⟡ COPY KEY ⟡", 2000);
        };
    </script>
</body>
</html>
