<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nove Key System | Final Step</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', 'Gotham', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Hareketli ışık çizgileri */
        .light-beam {
            position: absolute;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 150, 255, 0.4), transparent);
            animation: beamMove 6s linear infinite;
        }

        @keyframes beamMove {
            0% { transform: translateX(-50%) rotate(0deg); }
            100% { transform: translateX(50%) rotate(360deg); }
        }

        .beam-1 { top: 20%; left: -50%; width: 200%; animation-duration: 8s; }
        .beam-2 { bottom: 30%; left: -50%; width: 200%; animation-duration: 6s; animation-direction: reverse; }

        /* Dönen halkalar */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 150, 255, 0.15);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ring-1 { width: 400px; height: 400px; top: -200px; right: -200px; border-width: 2px; }
        .ring-2 { width: 600px; height: 600px; bottom: -300px; left: -300px; border-width: 1px; animation-direction: reverse; animation-duration: 25s; }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(25px);
            border-radius: 56px;
            padding: 55px 50px;
            border: 1px solid rgba(0, 200, 255, 0.4);
            box-shadow: 0 0 100px rgba(0, 100, 255, 0.2), inset 0 0 40px rgba(0, 100, 255, 0.05);
            animation: fadeSlideUp 0.7s ease-out;
            max-width: 520px;
            width: 90%;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.5);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 100, 255, 0.4); }
            50% { box-shadow: 0 0 90px rgba(0, 150, 255, 0.8); }
        }

        .logo span {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .step-badge {
            display: inline-block;
            background: rgba(0, 100, 255, 0.15);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 50px;
            padding: 6px 18px;
            font-size: 11px;
            font-weight: 600;
            color: #00a3ff;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #00a3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
        }

        .info-text {
            color: #a0b0d0;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .key-preview {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 20px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid rgba(0, 100, 255, 0.3);
            position: relative;
        }

        .key-preview::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            border-radius: 22px;
            opacity: 0.2;
            z-index: -1;
        }

        .key-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: #00a3ff;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .key-value {
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #00a3ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-break: break-all;
            letter-spacing: 2px;
        }

        .btn {
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            color: white;
            border: none;
            padding: 16px 45px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 25px rgba(0, 100, 255, 0.4);
            margin: 10px 0;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-green {
            background: linear-gradient(135deg, #00cc66, #009944);
            box-shadow: 0 0 25px rgba(0, 200, 100, 0.3);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.6);
        }

        .btn-green:hover {
            box-shadow: 0 0 40px rgba(0, 200, 100, 0.5);
        }

        .footer {
            margin-top: 30px;
            font-size: 10px;
            color: #4a6080;
            letter-spacing: 1px;
        }

        .glow-text {
            color: #00a3ff;
            text-shadow: 0 0 8px rgba(0, 163, 255, 0.5);
        }

        .redirect-message {
            font-size: 12px;
            color: #6a80a0;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="light-beam beam-1"></div>
    <div class="light-beam beam-2"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>

    <div class="container">
        <div class="logo"><span>N</span></div>
        <div class="step-badge">STEP 03 / 03</div>
        <h1>FINAL VERIFICATION</h1>
        <div class="info-text">
            Complete the final step to unlock your unique license key.
        </div>
        
        <div class="key-preview">
            <div class="key-label">YOUR UNIQUE KEY</div>
            <div class="key-value" id="keyDisplay">N7KQ-3X2M-9P4R-6V8W</div>
        </div>

        <button class="btn btn-green" id="copyBtn">⟡ COPY KEY ⟡</button>
        <div class="redirect-message">
            ⚡ Use this key in the Nove Hub script ⚡
        </div>
        <div class="footer">© 2024 NOVE • <span class="glow-text">PREMIUM SECURE SYSTEM</span></div>
    </div>

    <script>
        // Key değeri (API'den veya sabit)
        const keyValue = "N7KQ-3X2M-9P4R-6V8W";
        document.getElementById('keyDisplay').innerText = keyValue;

        document.getElementById('copyBtn').onclick = function() {
            navigator.clipboard.writeText(keyValue);
            this.innerText = "✓ COPIED!";
            setTimeout(() => this.innerText = "⟡ COPY KEY ⟡", 2000);
        };
    </script>
</body>
</html>
