<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nove | Get Your Key</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Space Grotesk',sans-serif;background:#0B0A0F;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:24px;}
        .bg{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 40%,rgba(139,92,246,0.15)0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(6,182,212,0.1)0%,transparent 50%);z-index:0;}
        .container{position:relative;z-index:2;max-width:500px;width:100%;}
        .card{background:rgba(18,17,23,0.9);backdrop-filter:blur(20px);border-radius:48px;border:1px solid rgba(255,255,255,0.08);padding:48px 40px;text-align:center;box-shadow:0 32px 64px -24px rgba(0,0,0,0.5);}
        .logo{width:70px;height:70px;background:linear-gradient(135deg,#8B5CF6,#06B6D4);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
        h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#FFF,#A855F7,#06B6D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
        .badge{display:inline-block;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);border-radius:100px;padding:6px 16px;font-size:0.7rem;color:#10B981;margin-bottom:32px;}
        h2{font-size:1.5rem;color:white;margin-bottom:16px;}
        p{color:#9A9AA9;font-size:0.9rem;line-height:1.6;margin-bottom:32px;}
        .btn{width:100%;padding:16px;border-radius:24px;font-weight:600;font-size:0.9rem;border:none;cursor:pointer;background:linear-gradient(135deg,#10B981,#059669);color:white;transition:all 0.2s;margin-bottom:16px;}
        .btn:hover{transform:translateY(-2px);}
        .key-box{background:rgba(0,0,0,0.4);border-radius:24px;padding:20px;border:1px solid rgba(16,185,129,0.3);margin-top:24px;}
        .key-value{font-family:monospace;font-size:1rem;font-weight:700;background:rgba(0,0,0,0.5);padding:14px;border-radius:16px;color:#10B981;word-break:break-all;margin:12px 0;}
        .copy-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:white;margin-top:8px;}
        .copy-btn:hover{background:rgba(255,255,255,0.1);transform:translateY(-2px);}
        .status{font-size:0.75rem;color:#6B6A7A;margin-top:16px;}
        .footer{margin-top:24px;font-size:0.7rem;color:#4A4A5A;text-align:center;}
        .hidden{display:none;}
        .loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 0.8s linear infinite;margin-right:10px;vertical-align:middle;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
<div class="bg"></div>
<div class="container">
    <div class="card">
        <div class="logo"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="1.5"/><path d="M2 17L12 22L22 17" stroke="white" stroke-width="1.5"/><path d="M2 12L12 17L22 12" stroke="white" stroke-width="1.5"/></svg></div>
        <h1>NOVE</h1>
        <div class="badge">✓ VERIFIED</div>
        <h2>Your Key Is Ready</h2>
        <p>You have successfully completed all verifications. Generate your unique key below.</p>
        <button class="btn" id="generateBtn">Generate Key</button>
        <div class="key-box hidden" id="keyBox">
            <div class="key-value" id="keyValue"></div>
            <button class="btn copy-btn" id="copyBtn">Copy to Clipboard</button>
        </div>
        <div class="status" id="statusMsg"></div>
        <div class="footer">© 2024 Nove Key System • Keys valid for 24 hours</div>
    </div>
</div>
<script>
    const BACKEND_URL = "http://localhost:3000";
    
    const generateBtn = document.getElementById('generateBtn');
    const keyBox = document.getElementById('keyBox');
    const keyValue = document.getElementById('keyValue');
    const copyBtn = document.getElementById('copyBtn');
    const statusMsgDiv = document.getElementById('statusMsg');
    
    generateBtn.addEventListener('click', async () => {
        generateBtn.disabled = true;
        generateBtn.innerHTML = '<span class="loader"></span> Generating...';
        statusMsgDiv.textContent = 'Connecting to secure server...';
        
        try {
            const response = await fetch(`${BACKEND_URL}/generate-key`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            
            if (data.success) {
                keyValue.textContent = data.key;
                keyBox.classList.remove('hidden');
                statusMsgDiv.innerHTML = '✅ Key generated! Valid for 24 hours.';
                generateBtn.innerHTML = '✓ Key Ready';
                generateBtn.disabled = true;
            } else {
                statusMsgDiv.textContent = '❌ ' + data.message;
                generateBtn.disabled = false;
                generateBtn.innerHTML = 'Generate Key';
            }
        } catch (err) {
            statusMsgDiv.textContent = '❌ Server connection failed. Make sure backend is running.';
            generateBtn.disabled = false;
            generateBtn.innerHTML = 'Generate Key';
        }
    });
    
    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(keyValue.textContent);
        copyBtn.innerHTML = '✓ Copied!';
        setTimeout(() => {
            copyBtn.innerHTML = 'Copy to Clipboard';
        }, 2000);
    });
</script>
</body>
</html>
