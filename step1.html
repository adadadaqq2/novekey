<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nove Key System | Step 1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d0d25 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Gotham', sans-serif;
        }
        .container {
            text-align: center;
            background: rgba(10, 15, 30, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 48px;
            border: 1px solid rgba(0, 100, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.1);
        }
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.5);
        }
        .logo span { font-size: 48px; font-weight: bold; color: white; }
        h1 { color: white; font-size: 28px; margin-bottom: 12px; }
        p { color: #8899bb; margin-bottom: 32px; }
        .btn {
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            color: white;
            border: none;
            padding: 14px 42px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 100, 255, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 100, 255, 0.5);
        }
        .footer { margin-top: 32px; color: #556688; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo"><span>N</span></div>
    <h1>NOVE KEY SYSTEM</h1>
    <p>Step 1 of 2 — Click below to continue</p>
    <button class="btn" id="startBtn">GO TO LINKVERTISE →</button>
    <div class="footer">© 2024 Nove Key System</div>
</div>

<script>
    // KENDİ 1. LİNKVERTİSE LİNKİNİ BURAYA YAPISTIR
    const LINKVERTISE_URL = "https://linkvertise.com/...";
    
    document.getElementById('startBtn').addEventListener('click', function() {
        window.location.href = LINKVERTISE_URL;
    });
</script>
</body>
</html>
