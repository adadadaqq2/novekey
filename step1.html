<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nove Key System | Step 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 50%, #0a0a1a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', 'Gotham', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Neon ışık efektleri */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: repeating-linear-gradient(
                0deg,
                transparent 0%,
                rgba(0, 100, 255, 0.03) 50%,
                transparent 100%
            );
            animation: scan 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-50%); }
            100% { transform: translateY(50%); }
        }

        /* Glowing orbs */
        .orb-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.3), transparent);
            border-radius: 50%;
            top: -150px;
            right: -150px;
            filter: blur(60px);
            animation: float 6s ease-in-out infinite;
        }

        .orb-2 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(0, 200, 255, 0.2), transparent);
            border-radius: 50%;
            bottom: -120px;
            left: -120px;
            filter: blur(50px);
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 60px 50px;
            border: 1px solid rgba(0, 150, 255, 0.4);
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.2), inset 0 0 30px rgba(0, 100, 255, 0.05);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 0 50px rgba(0, 100, 255, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 100, 255, 0.4); }
            50% { box-shadow: 0 0 70px rgba(0, 150, 255, 0.8); }
        }

        .logo span {
            font-size: 56px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #00a3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #00a3ff, #0064ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .step-badge {
            display: inline-block;
            background: rgba(0, 100, 255, 0.15);
            border: 1px solid rgba(0, 150, 255, 0.3);
            border-radius: 50px;
            padding: 6px 18px;
            font-size: 12px;
            font-weight: 600;
            color: #00a3ff;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        p {
            color: #a0b0d0;
            font-size: 16px;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .btn {
            background: linear-gradient(135deg, #0064ff, #00a3ff);
            color: white;
            border: none;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0, 100, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 150, 255, 0.6);
        }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #4a6080;
            letter-spacing: 1px;
        }

        .glow-text {
            color: #00a3ff;
            text-shadow: 0 0 10px rgba(0, 163, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="orb-1"></div>
    <div class="orb-2"></div>
    <div class="container">
        <div class="logo"><span>N</span></div>
        <div class="step-badge">STEP 01 / 02</div>
        <h1>NOVE KEY SYSTEM</h1>
        <p>Initial verification required to access your key</p>
        <button class="btn" id="startBtn">⟡ VERIFY NOW ⟡</button>
        <div class="footer">© 2024 NOVE • <span class="glow-text">PREMIUM SECURE SYSTEM</span></div>
    </div>

    <script>
        const LINKVERTISE_URL = "https://link-hub.net/5929102/qjfugotDingg";
        
        document.getElementById('startBtn').addEventListener('click', function() {
            window.location.href = LINKVERTISE_URL;
        });
    </script>
</body>
</html>
